<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<defs>
		<linearGradient id="hope2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#f0fdfa"/>
			<stop offset="100%" style="stop-color:#ccfbf1"/>
		</linearGradient>
	</defs>

	<rect width="400" height="300" fill="url(#hope2Grad)"/>
	<rect x="0" y="0" width="400" height="200" fill="#99f6e4"/>
	<rect x="0" y="190" width="400" height="110" fill="#5eead4"/>

	<!-- Persona respondiendo -->
	<ellipse cx="200" cy="250" rx="70" ry="25" fill="#d1d5db"/>
	<ellipse cx="200" cy="245" rx="55" ry="18" fill="#3b82f6"/>
	<circle cx="200" cy="215" r="28" fill="#fcd9b6"/>
	<ellipse cx="200" cy="200" rx="25" ry="12" fill="#92400e"/>
	<!-- Ojos abiertos -->
	<circle cx="192" cy="212" r="3" fill="#1e293b"/>
	<circle cx="208" cy="212" r="3" fill="#1e293b"/>
	<!-- Boca sonriendo -->
	<path d="M194 220 Q200 226 206 220" fill="none" stroke="#1e293b" stroke-width="2"/>
	<!-- Cejas de alivio -->
	<path d="M185 205 Q192 202 199 205" fill="none" stroke="#92400e" stroke-width="2"/>
	<path d="M201 205 Q208 202 215 205" fill="none" stroke="#92400e" stroke-width="2"/>
	<!-- Indicador de tos -->
	<text x="250" y="190" font-family="Arial" font-size="20">💭</text>
	<text x="270" y="208" font-family="Arial" font-size="12" fill="#64748b">*tos tos*</text>

	<!-- Persona ayudante sonriende -->
	<g transform="translate(290, 130)">
		<circle cx="0" cy="0" r="22" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-8" rx="18" ry="10" fill="#1f2937"/>
		<rect x="-15" y="22" width="30" height="55" rx="5" fill="#ef4444"/>
		<rect x="-18" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<rect x="6" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<!-- Cara feliz -->
		<path d="M-8,3 Q0,8 8,3" fill="none" stroke="#1e293b" stroke-width="2"/>
		<circle cx="-6" cy="-2" r="2" fill="#1e293b"/>
		<circle cx="6" cy="-2" r="2" fill="#1e293b"/>
		<!-- Manos de ayuda -->
		<circle cx="-35" cy="25" r="8" fill="#fcd9b6"/>
		<circle cx="-20" cy="15" r="8" fill="#fcd9b6"/>
	</g>

	<!-- Monitor de pulso -->
	<g transform="translate(40, 50)">
		<rect x="-35" y="-25" width="70" height="50" rx="5" fill="#1e293b"/>
		<text x="0" y="-8" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">PULSO</text>
		<!-- Línea de ritmo -->
		<polyline points="-25,15 -15,10 -5,20 5,5 15,15 25,10" fill="none" stroke="#22c55e" stroke-width="2">
			<animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
		</polyline>
		<text x="0" y="20" font-family="Arial Black" font-size="12" fill="#22c55e" text-anchor="middle">✔ PRESENTE</text>
	</g>

	<!-- Signo de éxito -->
	<g transform="translate(350, 50)">
		<circle cx="0" cy="0" r="28" fill="#22c55e"/>
		<text x="0" y="8" font-family="Arial" font-size="24" fill="white" text-anchor="middle">✓</text>
	</g>

	<!-- Burbuja de decisión -->
	<g transform="translate(140, 70)">
		<ellipse cx="0" cy="0" rx="60" ry="35" fill="white" stroke="#3b82f6" stroke-width="2"/>
		<polygon points="45,25 60,35 50,28" fill="white" stroke="#3b82f6" stroke-width="2"/>
		<text x="0" y="-8" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle" font-weight="bold">"¡Respira!"</text>
		<text x="0" y="10" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">¿Qué haces?</text>
	</g>
</svg>