<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<defs>
		<linearGradient id="recoveryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#fff7ed"/>
			<stop offset="100%" style="stop-color:#ffedd5"/>
		</linearGradient>
	</defs>

	<rect width="400" height="300" fill="url(#recoveryGrad)"/>
	<rect x="0" y="0" width="400" height="200" fill="#fed7aa"/>
	<rect x="0" y="190" width="400" height="110" fill="#fdba74"/>

	<!-- Persona en el suelo -->
	<ellipse cx="200" cy="250" rx="70" ry="25" fill="#d1d5db"/>
	<ellipse cx="200" cy="245" rx="55" ry="18" fill="#3b82f6"/>
	<circle cx="200" cy="215" r="28" fill="#fcd9b6"/>
	<ellipse cx="200" cy="200" rx="25" ry="12" fill="#92400e"/>

	<!-- Persona reanudando RCP -->
	<g transform="translate(270, 140)">
		<circle cx="0" cy="0" r="22" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-8" rx="18" ry="10" fill="#1f2937"/>
		<rect x="-15" y="22" width="30" height="55" rx="5" fill="#ef4444"/>
		<rect x="-18" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<rect x="6" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<!-- Brazos reanudando compresiones -->
		<line x1="-8" y1="30" x2="-55" y2="55" stroke="#fcd9b6" stroke-width="10" stroke-linecap="round"/>
		<circle cx="-55" cy="55" r="8" fill="#fcd9b6"/>
		<!-- Flecha circular de continuar -->
		<g transform="translate(40, 40)">
			<path d="M0,-20 A15,15 0 1,1 0,20" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
			<polygon points="5,15 15,25 0,18" fill="#22c55e"/>
			<animateTransform attributeName="transform" type="rotate" from="0 40 0" to="360 40 0" dur="2s" repeatCount="indefinite"/>
		</g>
	</g>

	<!-- DEA en espera -->
	<g transform="translate(80, 160)">
		<rect x="-25" y="-18" width="50" height="36" rx="5" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
		<rect x="-18" y="-12" width="36" height="24" fill="#6b7280"/>
		<text x="0" y="5" font-family="Arial" font-size="10" fill="white" text-anchor="middle">ESP</text>
	</g>

	<!-- Burbuja de instrucción -->
	<g transform="translate(160, 80)">
		<ellipse cx="0" cy="0" rx="70" ry="40" fill="white" stroke="#3b82f6" stroke-width="2"/>
		<polygon points="55,30 75,40 60,32" fill="white" stroke="#3b82f6" stroke-width="2"/>
		<text x="0" y="-12" font-family="Arial" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">"Continúa</text>
		<text x="0" y="8" font-family="Arial" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">RCP ahora"</text>
		<text x="0" y="28" font-family="Arial" font-size="11" fill="#64748b" text-anchor="middle">inmediatamente"</text>
	</g>
</svg>