<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<defs>
		<linearGradient id="tensionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#fef3c7"/>
			<stop offset="100%" style="stop-color:#fde68a"/>
		</linearGradient>
	</defs>

	<rect width="400" height="300" fill="url(#tensionGrad)"/>
	<rect x="0" y="0" width="400" height="200" fill="#fef9c3"/>
	<rect x="0" y="190" width="400" height="110" fill="#fcd34d"/>

	<!-- Persona en el suelo -->
	<ellipse cx="200" cy="250" rx="70" ry="25" fill="#d1d5db"/>
	<ellipse cx="200" cy="245" rx="55" ry="18" fill="#3b82f6"/>
	<circle cx="200" cy="215" r="28" fill="#fcd9b6"/>
	<ellipse cx="200" cy="200" rx="25" ry="12" fill="#92400e"/>

	<!-- Persona corriendo con DEA -->
	<g transform="translate(120, 150)">
		<!-- En movimiento -->
		<g transform="skewX(-15)">
			<ellipse cx="0" cy="45" rx="30" ry="10" fill="#d1d5db"/>
			<circle cx="0" cy="10" r="20" fill="#fcd9b6"/>
			<ellipse cx="0" cy="2" rx="16" ry="9" fill="#78716c"/>
			<rect x="-12" y="30" width="24" height="40" rx="4" fill="#ef4444"/>
			<!-- Piernas corriendo -->
			<line x1="-6" y1="70" x2="-15" y2="95" stroke="#1f2937" stroke-width="10" stroke-linecap="round"/>
			<line x1="6" y1="70" x2="15" y2="90" stroke="#1f2937" stroke-width="10" stroke-linecap="round"/>
			<!-- Brazo con DEA -->
			<line x1="12" y1="35" x2="30" y2="25" stroke="#fcd9b6" stroke-width="8"/>
		</g>
		<!-- DEA en mano -->
		<rect x="30" y="12" width="30" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
		<rect x="35" y="17" width="20" height="10" fill="#22c55e"/>
	</g>

	<!-- Persona esperando con duda -->
	<g transform="translate(280, 140)">
		<circle cx="0" cy="0" r="22" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-8" rx="18" ry="10" fill="#1f2937"/>
		<rect x="-15" y="22" width="30" height="55" rx="5" fill="#ef4444"/>
		<rect x="-18" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<rect x="6" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<!-- Manos en gesto de duda -->
		<circle cx="-25" cy="35" r="7" fill="#fcd9b6"/>
		<circle cx="25" cy="30" r="7" fill="#fcd9b6"/>
	</g>

	<!-- Burbuja de duda grande -->
	<g transform="translate(280, 80)">
		<ellipse cx="0" cy="0" rx="70" ry="45" fill="white" stroke="#f59e0b" stroke-width="3"/>
		<polygon points="50,40 70,50 55,42" fill="white" stroke="#f59e0b" stroke-width="3"/>
		<text x="0" y="-15" font-family="Arial" font-size="28" fill="#f59e0b" text-anchor="middle">¿?</text>
		<text x="0" y="10" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle" font-weight="bold">¿Seguir RCP</text>
		<text x="0" y="28" font-family="Arial" font-size="13" fill="#64748b" text-anchor="middle" font-weight="bold">o usar DEA?</text>
	</g>

	<!-- Reloj de arena animado -->
	<g transform="translate(40, 50)">
		<rect x="-20" y="-30" width="40" height="60" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
		<polygon points="0,-20 -5,-10 5,-10" fill="#f59e0b">
			<animateTransform attributeName="transform" type="translate" values="0,-20; 0,-10; 0,-20" dur="2s" repeatCount="indefinite"/>
		</polygon>
		<polygon points="0,20 -5,10 5,10" fill="#f59e0b">
			<animateTransform attributeName="transform" type="translate" values="0,20; 0,10; 0,20" dur="2s" repeatCount="indefinite"/>
		</polygon>
		<rect x="-5" y="-8" width="10" height="16" fill="#fed7aa">
			<animate attributeName="height" values="16;8;16" dur="2s" repeatCount="indefinite"/>
			<animate attributeName="y" values="-8;-2;-8" dur="2s" repeatCount="indefinite"/>
		</rect>
	</g>
</svg>