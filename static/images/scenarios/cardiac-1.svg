<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<defs>
		<linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#f3f4f6"/>
			<stop offset="100%" style="stop-color:#e5e7eb"/>
		</linearGradient>
		<linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#fef3c7"/>
			<stop offset="100%" style="stop-color:#fde68a"/>
		</linearGradient>
	</defs>

	<!-- Fondo: Centro Comercial -->
	<rect width="400" height="300" fill="#f9fafb"/>
	<rect x="0" y="0" width="400" height="200" fill="url(#wallGrad)"/>
	<rect x="0" y="190" width="400" height="110" fill="url(#floorGrad)"/>

	<!-- Tiendas -->
	<rect x="10" y="20" width="80" height="150" rx="5" fill="#d1d5db"/>
	<rect x="20" y="30" width="60" height="80" fill="#93c5fd"/>
	<rect x="310" y="20" width="80" height="150" rx="5" fill="#d1d5db"/>
	<rect x="320" y="30" width="60" height="80" fill="#fca5a5"/>

	<!-- Persona tirada en el suelo -->
	<ellipse cx="200" cy="250" rx="70" ry="25" fill="#d1d5db"/>
	<!-- Cuerpo -->
	<ellipse cx="200" cy="245" rx="55" ry="18" fill="#3b82f6"/>
	<!-- Cabeza -->
	<circle cx="200" cy="215" r="28" fill="#fcd9b6"/>
	<!-- Cabello -->
	<ellipse cx="200" cy="200" rx="25" ry="12" fill="#92400e"/>
	<!-- Cara -->
	<circle cx="192" cy="212" r="2" fill="#78716c"/>
	<circle cx="208" cy="212" r="2" fill="#78716c"/>
	<ellipse cx="200" cy="223" rx="4" ry="2" fill="#f87171"/>

	<!-- Persona ayudando (jugador) -->
	<g transform="translate(280, 160)">
		<circle cx="0" cy="0" r="22" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-8" rx="18" ry="10" fill="#1f2937"/>
		<rect x="-15" y="22" width="30" height="50" rx="5" fill="#ef4444"/>
		<rect x="-18" y="72" width="12" height="30" rx="3" fill="#1f2937"/>
		<rect x="6" y="72" width="12" height="30" rx="3" fill="#1f2937"/>
		<!-- Brazos extendidos hacia la víctima -->
		<line x1="-10" y1="30" x2="-50" y2="50" stroke="#fcd9b6" stroke-width="10" stroke-linecap="round"/>
		<circle cx="-50" cy="50" r="8" fill="#fcd9b6"/>
	</g>

	<!-- Gente observando -->
	<g transform="translate(60, 160)">
		<circle cx="0" cy="0" r="16" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-7" rx="14" ry="8" fill="#78716c"/>
		<rect x="-12" y="16" width="24" height="40" rx="3" fill="#9ca3af"/>
	</g>

	<g transform="translate(340, 155)">
		<circle cx="0" cy="0" r="16" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-7" rx="14" ry="8" fill="#fbbf24"/>
		<rect x="-12" y="16" width="24" height="35" rx="3" fill="#a8a29e"/>
	</g>

	<!-- Signo de emergencia -->
	<circle cx="200" cy="40" r="28" fill="#dc2626"/>
	<rect x="188" y="28" width="24" height="6" rx="2" fill="white"/>
	<rect x="188" y="36" width="24" height="6" rx="2" fill="white"/>
	<rect x="196" y="20" width="8" height="24" rx="2" fill="white"/>

	<!-- Signo de "Socorro" -->
	<text x="350" y="280" font-family="Arial Black" font-size="14" fill="#dc2626">¡SOCORRO!</text>
</svg>