<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<defs>
		<radialGradient id="urgencyGrad">
			<stop offset="0%" style="stop-color:#fef2f2"/>
			<stop offset="100%" style="stop-color:#fee2e2"/>
		</radialGradient>
	</defs>

	<rect width="400" height="300" fill="url(#urgencyGrad)"/>
	<rect x="0" y="0" width="400" height="200" fill="#fecaca"/>
	<rect x="0" y="190" width="400" height="110" fill="#f87171"/>

	<!-- Tiendas difuminadas -->
	<rect x="10" y="20" width="80" height="150" rx="5" fill="#fca5a5" opacity="0.5"/>
	<rect x="310" y="20" width="80" height="150" rx="5" fill="#fca5a5" opacity="0.5"/>

	<!-- Persona en el suelo empeorando -->
	<ellipse cx="200" cy="250" rx="70" ry="25" fill="#d1d5db"/>
	<ellipse cx="200" cy="245" rx="55" ry="18" fill="#dc2626"/>
	<circle cx="200" cy="215" r="28" fill="#fcd9b6"/>
	<ellipse cx="200" cy="200" rx="25" ry="12" fill="#92400e"/>
	<!-- Cara pálida -->
	<circle cx="200" cy="215" r="26" fill="#fef2f2" opacity="0.6"/>
	<circle cx="192" cy="212" r="2" fill="#78716c"/>
	<circle cx="208" cy="212" r="2" fill="#78716c"/>

	<!-- Señales de alarma -->
	<g>
		<polygon points="320,25 330,50 310,50" fill="#dc2626">
			<animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
		</polygon>
		<polygon points="80,25 90,50 70,50" fill="#dc2626">
			<animate attributeName="opacity" values="0.3;1;0.3" dur="0.8s" repeatCount="indefinite"/>
		</polygon>
	</g>

	<!-- Burbuja de "¡DEA!" -->
	<g transform="translate(100, 100)">
		<ellipse cx="0" cy="0" rx="45" ry="30" fill="white" stroke="#ef4444" stroke-width="2"/>
		<polygon points="35,20 50,35 40,25" fill="white" stroke="#ef4444" stroke-width="2"/>
		<text x="0" y="-5" font-family="Arial Black" font-size="14" fill="#ef4444" text-anchor="middle">¡DEA en</text>
		<text x="0" y="15" font-family="Arial Black" font-size="14" fill="#ef4444" text-anchor="middle">la entrada!</text>
	</g>

	<!-- Gente asustada -->
	<g transform="translate(60, 170)">
		<circle cx="0" cy="0" r="16" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-7" rx="14" ry="8" fill="#78716c"/>
		<rect x="-12" y="16" width="24" height="40" rx="3" fill="#9ca3af"/>
	</g>

	<g transform="translate(340, 165)">
		<circle cx="0" cy="0" r="16" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-7" rx="14" ry="8" fill="#78716c"/>
		<rect x="-12" y="16" width="24" height="35" rx="3" fill="#a8a29e"/>
	</g>

	<!-- Timer urgente -->
	<g transform="translate(200, 80)">
		<circle cx="0" cy="0" r="30" fill="#dc2626">
			<animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite"/>
		</circle>
		<text x="0" y="5" font-family="Arial Black" font-size="20" fill="white" text-anchor="middle">⏱</text>
		<text x="0" y="-40" font-family="Arial Black" font-size="12" fill="#dc2626" text-anchor="middle">¡RAPIDEZ!</text>
	</g>
</svg>