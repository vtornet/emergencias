<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<defs>
		<linearGradient id="cautionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#fefce8"/>
			<stop offset="100%" style="stop-color:#fef9c3"/>
		</linearGradient>
	</defs>

	<rect width="400" height="300" fill="url(#cautionGrad)"/>
	<rect x="0" y="0" width="400" height="200" fill="#fef3c7"/>
	<rect x="0" y="190" width="400" height="110" fill="#fde047"/>

	<!-- Persona en posición lateral mejorando -->
	<g transform="rotate(10 200 240)">
		<ellipse cx="200" cy="250" rx="65" ry="20" fill="#d1d5db"/>
		<ellipse cx="200" cy="245" rx="50" ry="15" fill="#3b82f6"/>
		<circle cx="205" cy="215" r="26" fill="#fcd9b6"/>
		<ellipse cx="205" cy="200" rx="22" ry="11" fill="#92400e"/>
		<circle cx="200" cy="212" r="2" fill="#1e293b"/>
		<circle cx="212" cy="212" r="2" fill="#1e293b"/>
		<ellipse cx="206" cy="220" rx="3" ry="2" fill="#f87171"/>
	</g>

	<!-- Ambulancia -->
	<g transform="translate(60, 140)">
		<rect x="-45" y="-30" width="90" height="60" rx="5" fill="#ef4444"/>
		<rect x="-35" y="-20" width="25" height="18" fill="#93c5fd"/>
		<rect x="10" y="-20" width="25" height="18" fill="#93c5fd"/>
		<!-- Sirena brillante -->
		<circle cx="40" cy="0" r="18" fill="#3b82f6">
			<animate attributeName="opacity" values="1;0.4;1" dur="0.5s" repeatCount="indefinite"/>
		</circle>
		<circle cx="40" cy="0" r="12" fill="#60a5fa">
			<animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" repeatCount="indefinite"/>
		</circle>
		<!-- Cruz -->
		<rect x="-5" y="-12" width="10" height="4" fill="white"/>
		<rect x="-3" y="-15" width="4" height="10" fill="white"/>
		<!-- Ruedas -->
		<circle cx="-30" cy="30" r="12" fill="#1f2937"/>
		<circle cx="30" cy="30" r="12" fill="#1f2937"/>
	</g>

	<!-- Sanitario con maletín -->
	<g transform="translate(160, 130)">
		<circle cx="0" cy="0" r="20" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-7" rx="16" ry="9" fill="#3b82f6"/>
		<rect x="-13" y="11" width="26" height="45" rx="4" fill="#3b82f6"/>
		<rect x="-16" y="56" width="10" height="28" rx="3" fill="#1f2937"/>
		<rect x="6" y="56" width="10" height="28" rx="3" fill="#1f2937"/>
		<!-- Maletín -->
		<rect x="20" y="40" width="28" height="22" rx="3" fill="#f59e0b"/>
		<rect x="23" y="45" width="22" height="2" fill="#fbbf24"/>
		<rect x="23" y="50" width="22" height="2" fill="#fbbf24"/>
		<rect x="30" y="52" width="8" height="8" fill="#78716c"/>
		<!-- Brazo extendido -->
		<line x1="13" y1="20" x2="35" y2="40" stroke="#fcd9b6" stroke-width="8"/>
	</g>

	<!-- Jugador -->
	<g transform="translate(300, 130)">
		<circle cx="0" cy="0" r="22" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-8" rx="18" ry="10" fill="#1f2937"/>
		<rect x="-15" y="22" width="30" height="55" rx="5" fill="#ef4444"/>
		<rect x="-18" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<rect x="6" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
	</g>

	<!-- Burbuja del sanitario -->
	<g transform="translate(180, 60)">
		<ellipse cx="0" cy="0" rx="60" ry="30" fill="white" stroke="#22c55e" stroke-width="2"/>
		<polygon points="50,20 65,30 55,22" fill="white" stroke="#22c55e" stroke-width="2"/>
		<text x="0" y="-5" font-family="Arial" font-size="11" fill="#1e293b" text-anchor="middle" font-weight="bold">"¡Bien hecho!"</text>
		<text x="0" y="12" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">Me hago cargo</text>
	</g>

	<!-- Indicador de entrega -->
	<g transform="translate(350, 280)">
		<circle cx="0" cy="0" r="25" fill="#3b82f6"/>
		<text x="0" y="-5" font-family="Arial" font-size="9" fill="white" text-anchor="middle">ENTREGAR</text>
		<text x="0" y="12" font-family="Arial" font-size="16" fill="white" text-anchor="middle">🤝</text>
	</g>
</svg>