<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
	<defs>
		<linearGradient id="actionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
			<stop offset="0%" style="stop-color:#f0fdf4"/>
			<stop offset="100%" style="stop-color:#dcfce7"/>
		</linearGradient>
	</defs>

	<rect width="400" height="300" fill="url(#actionGrad)"/>
	<rect x="0" y="0" width="400" height="200" fill="#bbf7d0"/>
	<rect x="0" y="190" width="400" height="110" fill="#86efac"/>

	<!-- Persona en el suelo -->
	<ellipse cx="200" cy="250" rx="70" ry="25" fill="#d1d5db"/>
	<ellipse cx="200" cy="245" rx="55" ry="18" fill="#3b82f6"/>
	<circle cx="200" cy="215" r="28" fill="#fcd9b6"/>
	<ellipse cx="200" cy="200" rx="25" ry="12" fill="#92400e"/>

	<!-- DEA activado con brillantes -->
	<g transform="translate(200, 110)">
		<rect x="-35" y="-25" width="70" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="4">
			<animate attributeName="stroke-opacity" values="1;0.4;1" dur="0.5s" repeatCount="indefinite"/>
		</rect>
		<rect x="-25" y="-15" width="50" height="30" fill="#22c55e"/>
		<!-- Línea de ritmo cardíaco -->
		<polyline points="-20,0 -10,0 -5,-8 0,8 5,-8 10,0 20,0" fill="none" stroke="white" stroke-width="3">
			<animate attributeName="opacity" values="1;0.5;1" dur="0.3s" repeatCount="indefinite"/>
		</polyline>
		<!-- Palabra SHOCK brillante -->
		<text x="0" y="-45" font-family="Arial Black" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold">
			SHOCK
			<animate attributeName="opacity" values="1;0.6;1" dur="0.4s" repeatCount="indefinite"/>
		</text>
		<!-- Rayo eléctrico -->
		<path d="M0,30 L-8,50 L8,50 L0,70" fill="none" stroke="#fbbf24" stroke-width="4">
			<animate attributeName="opacity" values="1;0.3;1" dur="0.2s" repeatCount="indefinite"/>
		</path>
	</g>

	<!-- Persona con manos arriba -->
	<g transform="translate(300, 140)">
		<circle cx="0" cy="0" r="22" fill="#fcd9b6"/>
		<ellipse cx="0" cy="-8" rx="18" ry="10" fill="#1f2937"/>
		<rect x="-15" y="22" width="30" height="55" rx="5" fill="#ef4444"/>
		<rect x="-18" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<rect x="6" y="77" width="12" height="30" rx="3" fill="#1f2937"/>
		<!-- Manos levantadas -->
		<circle cx="-40" cy="20" r="9" fill="#fcd9b6"/>
		<circle cx="-25" cy="5" r="9" fill="#fcd9b6"/>
	</g>

	<!-- Panel de ritmo lateral -->
	<g transform="translate(320, 50)">
		<rect x="-40" y="-30" width="80" height="60" rx="5" fill="#1e293b"/>
		<text x="0" y="-10" font-family="Arial" font-size="10" fill="#22c55e" text-anchor="middle">RITMO</text>
		<text x="0" y="15" font-family="Arial Black" font-size="18" fill="#ef4444" text-anchor="middle">FV/VT</text>
		<!-- Pequeña línea de ritmo -->
		<polyline points="-30,5 -20,5 -15,0 -10,10 -5,5 5,5" fill="none" stroke="#22c55e" stroke-width="1"/>
	</g>

	<!-- Signo "¡ALÉJATE!" -->
	<g transform="translate(60, 60)">
		<circle cx="0" cy="0" r="35" fill="#3b82f6"/>
		<text x="0" y="-8" font-family="Arial Black" font-size="11" fill="white" text-anchor="middle">¡ALÉJATE!</text>
		<g transform="translate(0, 15)">
			<path d="M-15,0 L-5,-10 L5,0" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
			<path d="M15,0 L5,-10 L-5,0" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
		</g>
	</g>
</svg>